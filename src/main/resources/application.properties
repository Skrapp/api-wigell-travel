spring.application.name=api-wigell-travels
server.port=8581

#MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/wigell_travel_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

#JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://grupp-d.eduflexlms.se/realms/wigell-realm

# Spring Boot Admin Client (Group Monitoring)
spring.boot.admin.client.url=http://localhost:9090
spring.boot.admin.client.instance.service-base-url=http://localhost:8581

#Converter
converter.service.url: http://localhost:8587

# Actuator (Expose all for Dashboard)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#Logging
logging.level.root=INFO