server.port=8581
spring.application.name=api-wigell-

#MySQL
spring.datasource.url=jdbc:mysql://localhost:6606/wigell_travel_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/wigell-realm